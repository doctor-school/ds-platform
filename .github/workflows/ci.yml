name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  # ─── Core build/test/lint (parallel after setup) ─────────────────────
  # `pnpm lint` runs, in order: `eslint .` (incl. the #197 auth-field gate and the
  # #234 design-system guardrails — local/no-arbitrary-tailwind-value,
  # local/no-token-redefinition, rhythmguard-tailwind/tailwind-class-use-scale),
  # then `pnpm lint:oxlint` (#234 spec §4 level 1 — tailwindcss/no-hardcoded-colors
  # via oxlint-tailwindcss), then `pnpm lint:stylelint` (#234 level 2 CSS side —
  # rhythmguard/use-scale), then `turbo run lint` (per-package). All blocking;
  # this job is in the `ci` meta-job needs-list, so any guardrail failure blocks merge.
  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  types:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # Pure-unit tests for every package EXCEPT @ds/api. @ds/api's suites boot
  # DatabaseModule / hit Postgres + pgvector, so they run in the `api-e2e` job
  # against a service container (#66). Keeping them out here lets `unit` stay
  # service-free and fast.
  unit:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter='!@ds/api'

  # apps/api e2e (readiness EARS-1, health EARS-1) + unit specs against a real
  # Postgres 17 + pgvector + pg_partman. The Vitest globalSetup runs
  # `drizzle:migrate:ci` (drizzle-kit migrate, no dev-stand snapshot) before the
  # suite (#66); migration 0004 installs the pg_partman extension, so the DB must
  # carry the partman BINARY.
  #
  # GitHub Actions `services:` can only pull a pre-built image, and the bare
  # pgvector/pgvector:pg17 image has no pg_partman — so instead of a `services:`
  # block we BUILD the data-layer image from infra/dev-stand/postgres/Dockerfile
  # (the SSOT image: pgvector + pg_partman, #369) and run it as a step. The
  # migration self-creates the partman schema + extension, so no init.sql mount
  # is needed. Same creds/port/DB name the suite expects on DATABASE_URL.
  api-e2e:
    needs: setup
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://ds:ds@localhost:5432/ds_test
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build the data-layer Postgres image (pgvector + pg_partman)
        run: docker build -t ds-platform/postgres:pg17-partman infra/dev-stand/postgres
      - name: Start Postgres
        run: |
          docker run -d --name ds-postgres \
            -e POSTGRES_USER=ds \
            -e POSTGRES_PASSWORD=ds \
            -e POSTGRES_DB=ds_test \
            -p 5432:5432 \
            ds-platform/postgres:pg17-partman
      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec ds-postgres pg_isready -U ds -d ds_test; then
              echo "Postgres is ready"; exit 0
            fi
            echo "waiting for Postgres ($i/30)..."; sleep 2
          done
          echo "Postgres did not become ready in time"; docker logs ds-postgres; exit 1
      - run: pnpm exec turbo run test --filter=@ds/api

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # apps/api build smoke (#158). The plain `build` job above runs a single COLD
  # `pnpm build`, so it cannot catch either Issue-#158 defect: (1) a stale
  # external tsbuildinfo surviving `deleteOutDir` makes a WARM `nest build` emit
  # an empty `dist/`, and (2) an extensionless `@nestjs/common/constants` subpath
  # is unresolvable for built ESM on Node (only tsx/Vitest/webpack tolerate it).
  # This guard builds twice + does a real Node `import()` of the built module.
  # Infra-free: both defects fail before any DB/Redis/Zitadel I/O — no services.
  api-build-smoke:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # The built AppModule imports the workspace packages @ds/db + @ds/schemas
      # by their built `dist/` (their package `exports`), so build deps first.
      - run: pnpm exec turbo run build --filter=@ds/api^...
      - run: pnpm --filter @ds/api build:smoke

  docs-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ds/docs build

  # ─── Design-token freshness guard (#233) ─────────────────────────────
  # The generated design tokens (packages/design-system/src/styles/tokens.css +
  # allowed-tokens.json) are committed so apps build with no prebuild. This job
  # regenerates them from the DTCG source and fails if the committed output is
  # stale — keeping the source-of-truth (tokens/*.json) and the emitted CSS in
  # lockstep. The token-build also validates that every reference resolves.
  tokens-fresh:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ds/design-system build
      - name: Verify generated tokens are committed and up to date
        run: git diff --exit-code -- packages/design-system/src/styles/tokens.css packages/design-system/src/styles/allowed-tokens.json

  # ─── Drift guards from ADR-0006 §7 ───────────────────────────────────
  api-drift:
    needs: setup
    if: false # Enabled by G8: apps/api (NestJS) + openapi.snapshot.json land then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: echo "api-drift placeholder"

  db-drift:
    needs: setup
    if: false # Enabled by G6: packages/db Drizzle schema lands then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: echo "db-drift placeholder"

  # events-drift / glossary-mdx / glossary-roundtrip are ADR-0006 §6/§7 BASELINE
  # hard-red checks (AGENTS.md §5) — wired into the `ci` meta-job needs-list
  # (#440). The scripts behind them are still exit-0 stubs; real implementation
  # tracked by #448 (posture decision at landing time recorded here).
  events-drift:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/events-lint.ts

  generated-artifacts:
    needs: setup
    if: false # Enabled by G6: pnpm generate:all + generators (drizzle/openapi-typescript/etc.) land then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: echo "generated-artifacts placeholder"

  markdown-links:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --include-fragments .
          fail: true

  # module-readme: every top-level NestJS module dir under apps/*/src (a dir with a
  # *.module.ts) carries a README (ADR-0006 §7). Was an exit-0 stub; implemented as
  # a REAL WARN v1 in #438 — EXITS NON-ZERO on findings, with a tracked-Issue
  # grandfather allowlist for the 6 pre-existing gaps. Promotion clock (ADR-0007
  # §2.6, 4 clean weeks) starts at merge — 2026-07-02. Kept WARN
  # (`continue-on-error`) until the sweep flips it; do not remove it here.
  module-readme:
    needs: setup
    continue-on-error: true # WARN — promotion clock starts at merge 2026-07-02 (ADR-0007 §2.6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/module-readme-lint.ts

  # ─── Glossary 4-layer validation from ADR-0006 §6 ────────────────────
  # Baseline hard-red, in the `ci` needs-list (#440); scripts are still exit-0
  # stubs — real implementation tracked by #448 (see events-drift note above).
  glossary-mdx:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/glossary-mdx-lint.ts

  # glossary-ids: covered by ESLint rule `glossary-canonical-ids` inside `lint` job.
  # Re-enable as separate job in G5 when packages/eslint-config rule lands.

  glossary-roundtrip:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/glossary-roundtrip-lint.ts

  # ─── AI-specific guards from ADR-0007 §2.6 ───────────────────────────
  spec-link:
    needs: setup
    runs-on: ubuntu-latest
    # `tools/lint/spec-link-lint.ts` calls `gh pr view <N>` to read PR
    # metadata. The default GITHUB_TOKEN scope under restrictive workflow
    # permissions ("Read repository contents permission only") lacks
    # `pull-requests: read`, which made `gh pr view` exit non-zero and
    # caused the script to fail before its label-skip short-circuit.
    # See Issue #10 root cause 1.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/spec-link-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # ─── Endpoint authorization completeness gate (BLOCK) ────────────────
  # Spec: 2026-05-18-ds-platform-endpoint-authorization-matrix-design-en.md §6.
  # Deliberate exception to the Phase-0 WARN posture (ADR-0007 §2.6 / spec §6.3):
  # ADR-0001 §2.5 and engineering-readiness §3 both mandate hard failure on
  # missing @Authz metadata, and the matrix is a named pre-pilot security
  # BLOCKER. Vacuously green when there are no routes to classify. No Postgres
  # service: the gate boots a Nest application *context* (no listen) with a
  # placeholder DATABASE_URL and never issues a query (the pool is lazy).
  endpoint-authz:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # The gate boots the real AppModule, which imports the workspace packages
      # @ds/db + @ds/schemas by their built `dist/` (their package `exports`).
      # @ds/api itself runs from source via tsx, so only its deps need building.
      - run: pnpm exec turbo run build --filter=@ds/api^...
      - run: pnpm lint:endpoint-authz

  # ─── Enforcement gates for already-written rules (#251, epic #247) ────
  # registry-research: a PR touching a user-facing UI surface must carry the
  # `build-ui-from-design-system` adoption artifact in its body (ADR-0013 /
  # AGENTS.md §6). no-stub: user-facing source must not ship a "set this env
  # var" dev placeholder or an untracked TODO/FIXME stub (AGENTS.md §6). Both
  # land as WARN per the ADR-0007 §2.6 new-guard posture — promote to BLOCK
  # once stable. Excluded from the `ci` meta-job needs-list while WARN.
  registry-research:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:registry-research
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  no-stub:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:no-stub

  # showcase-coverage: the design-system living showcase (apps/showcase) is the
  # rendered viewer of @ds/design-system — it must stay *living*. This guard
  # asserts every package COMPONENT export has a catalogued entry in the showcase
  # registry (apps/showcase/app/lib/registry.ts), so a new primitive/block cannot
  # ship without appearing in the catalogue (design-system-showcase spec §5.1,
  # #350). Static source scan — no PR/gh context needed. WARN per ADR-0007 §2.6.
  showcase-coverage:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:showcase-coverage

  # showcase-snippet: the showcase (apps/showcase) is the rendered VIEWER of
  # @ds/design-system — it re-implements nothing (design-system-showcase spec §2.4).
  # A hand-typed usage snippet (a STRING/template-literal constant depicting a block
  # import or PascalCase JSX) is a second, hand-maintained copy of code the package
  # owns and DRIFTS; mature systems auto-extract displayed code from the real source
  # so it cannot. This guard flags such literals (#396). Static source scan — no
  # PR/gh context needed. WARN per ADR-0007 §2.6.
  showcase-snippet:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:showcase-snippet

  # asset-format: product assets are vector-first (ADR-0013 §8, #275) — logos /
  # icons ship as SVG, raster as WEBP minimum; committed *.png / *.jpg / *.jpeg
  # under apps/*/public or @ds/design-system is an asset-hygiene defect. Static
  # file scan — no PR/gh context needed. WARN per ADR-0007 §2.6.
  asset-format:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:asset-format

  # interaction-states: a @ds/design-system clickable primitive must carry its
  # hover + focus-visible contract, and the globals.css layer-1 base-reset
  # (cursor / prefers-reduced-motion) must stay intact (ADR-0013 §7 layer 3,
  # #269). Static source scan — no PR/gh context needed. WARN per ADR-0007 §2.6.
  interaction-states:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:interaction-states

  # aa-contrast: the cheap STATIC pre-filter for the AA-contrast usage rule (ADR-0013
  # §7), left of the runtime playwright-axe tier (#351). Flags the two deterministic
  # token-level anti-patterns — an opacity-dimmed `text-*-foreground/NN` and a
  # text-bearing raw `bg-primary` fill — that no colour / arbitrary-value guard catches
  # (both are valid tokens). The #351 retarget caught 4 such defects only at runtime;
  # this gate catches the static subset early (#402). Static source scan — no PR/gh
  # context needed. WARN per ADR-0007 §2.6.
  aa-contrast:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:aa-contrast

  # form-error: a form-level error/message in app UI source must route through the
  # @ds/design-system `FormError` / `FormMessage` primitive, not be hand-typed as a
  # raw `<p role="alert" className="text-destructive">` per page (ADR-0013 §7,
  # #333 redo / #339). `text-destructive` is a valid token, so no color / arbitrary
  # -value guard catches the duplication — only this one does. Static source scan —
  # no PR/gh context needed. WARN per ADR-0007 §2.6.
  form-error:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:form-error

  # form-rhythm: the settled form vertical-rhythm + error-state contract (ADR-0013
  # §7 "Form layout & validation contract", #333 redo / #334). Flags the three
  # valid-token defects the #333 owner review caught and every prior gate missed:
  # a `min-h-*` reserved blank line on a message (K-1 over-spacing), a duplicate
  # `formDescriptionId` (a `<FormDescription>` beside a `<FormMessage>` — the
  # PasswordField bug), and a `text-destructive` label in the error state (K-3 "red
  # mush"). Static source scan over the DS form primitives + app surfaces — no
  # PR/gh context. WARN per ADR-0007 §2.6.
  form-rhythm:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:form-rhythm

  # submit-pending: the async-submit pending standard (ADR-0013 §7 layer 2, #337).
  # Flags a `type="submit"` control disabled by an in-flight flag
  # (`disabled={isSubmitting}`) with no `loading` prop — a static disabled button that
  # gives no progress signal and reads as hung (the #333 Stage-B owner finding). The
  # design system already ships the fix (`Button.loading` = spinner + `aria-busy` +
  # disabled-while-loading); this guard catches the adoption gap, a valid-token combo
  # every prior gate passes. Static source scan over the DS blocks/primitives + app
  # surfaces — no PR/gh context. WARN per ADR-0007 §2.6.
  submit-pending:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:submit-pending

  # ears-tests: the COVERAGE + ORPHAN direction of the EARS↔test contract (#316,
  # ADR-0006 §4). Every requirement id has a test title that cites it (folding a
  # flat `EARS-N` spec ↔ nested `EARS-N.M` tests component-wise), and no test title
  # cites a requirement no spec declares. As of #437 the guard FOLDS nested ids +
  # EXITS NON-ZERO on findings (the promotion prerequisite), with a tracked-Issue
  # deferral allowlist for the genuine gaps. Promotion clock (ADR-0007 §2.6, 4 clean
  # weeks) starts at merge — 2026-07-02. Kept WARN (`continue-on-error`) until the
  # sweep flips it; do not remove `continue-on-error` here — promotion is a later
  # sweep decision, not this change.
  ears-tests:
    needs: setup
    continue-on-error: true # WARN — promotion clock starts at merge 2026-07-02 (ADR-0007 §2.6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/ears-test-lint.ts

  # ears-naming: the FORMAT-hygiene direction of the EARS↔test contract (#316,
  # ADR-0006 §4). `ears-tests` (above) owns coverage+orphan; this flags a MALFORMED
  # EARS prefix on a test title (ears-3:, EARS3:, EARS-3 without a colon), accepting
  # every real shape (flat / nested / compound EARS-N/M / (#issue)). It does NOT
  # demand every test be EARS-named — a legit non-EARS unit / #issue test is left
  # alone. Static title scan. WARN per ADR-0007 §2.6.
  ears-naming:
    needs: setup
    continue-on-error: true # WARN v1 (promote to BLOCK once stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:ears-naming

  # playwright-axe: the RUNTIME twin of the `interaction-states` STATIC lint
  # (ADR-0013 §7 layer 4, #274). RETARGETED onto the design-system showcase
  # (apps/showcase) per design-system-showcase spec §5.2 (#351): it builds the
  # showcase, boots it with `next start` (via the CI Playwright config's
  # `webServer`), and drives the real rendered catalogue — an interaction smoke
  # (computed cursor pointer/not-allowed, hover style delta, keyboard
  # focus-visible ring) + an axe-core a11y/contrast scan of every showcase route
  # (/, /tokens, /primitives, /blocks, /candidates). Because the showcase renders
  # every primitive/block in every state in one place, this is a STRICT SUPERSET
  # of the prior auth-only checks (which it replaces — the portal CI tier was
  # retired in the same change; the portal keeps only its LIVE dev-stand tier).
  # BACKEND-FREE — the showcase is a pure viewer with no BFF, so no api / Zitadel
  # / Mailpit / Postgres. BLOCKING per ADR-0007 §2.6 (promoted from WARN once
  # stable, #285), so this gate is wired into the `ci` meta-job needs-list. The
  # static twin (`interaction-states`, L3) stays WARN for now.
  playwright-axe:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Build the showcase (and its workspace deps) so `next start` serves a real
      # production build — the same path the `build` job exercises, no special env.
      - run: pnpm exec turbo run build --filter=@ds/showcase
      - run: pnpm --filter @ds/showcase exec playwright install --with-deps chromium
      - run: pnpm --filter @ds/showcase test:e2e:ci

  # tdd-signal: a PR that changes production source under apps/*/src with no test
  # in the diff AND no pre-existing test in the changed module (design §5.2,
  # heuristic). Was an exit-0 stub; implemented as a REAL WARN v1 in #438 — reads
  # the changed-file set from `gh pr view` (PR-event-gated; shallow CI checkout has
  # no base to diff) and EXITS NON-ZERO on findings. Promotion clock (ADR-0007
  # §2.6, 4 clean weeks) starts at merge — 2026-07-02. Kept WARN
  # (`continue-on-error`) until the sweep flips it; do not remove it here.
  tdd-signal:
    needs: setup
    continue-on-error: true # WARN — promotion clock starts at merge 2026-07-02 (ADR-0007 §2.6)
    runs-on: ubuntu-latest
    # The guard calls `gh pr view <N>` — same wiring as spec-link: the default
    # GITHUB_TOKEN under restrictive workflow permissions lacks
    # `pull-requests: read`, which makes `gh pr view` exit non-zero before the
    # guard's skip short-circuit (Issue #10 root cause 1).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/tdd-signal-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # spec-status-fresh: a feature:NNN-<slug> PR whose bound spec is still
  # `status: Draft` (design §5.2, `In dev` minimum). Was an exit-0 stub;
  # implemented as a REAL WARN v1 in #438 — PR-event-gated (exits 0 outside a PR;
  # also run by `pnpm pr:preflight`), exempts the authoring PR that edits the
  # requirements file, EXITS NON-ZERO on a Draft-below-floor finding. Promotion
  # clock (ADR-0007 §2.6, 4 clean weeks) starts at merge — 2026-07-02. Kept WARN
  # (`continue-on-error`) until the sweep flips it; do not remove it here.
  spec-status-fresh:
    needs: setup
    continue-on-error: true # WARN — promotion clock starts at merge 2026-07-02 (ADR-0007 §2.6)
    runs-on: ubuntu-latest
    # `gh pr view` wiring — see the tdd-signal note (Issue #10 root cause 1).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/spec-status-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # prior-decisions: a PR that adds/edits a feature-spec requirements file must
  # cite ≥1 ADR in a `## Prior decisions` section (design §5.2). Was an exit-0
  # stub; implemented as a REAL WARN v1 in #438 — PR-event-gated (exits 0 outside a
  # PR; also run by `pnpm pr:preflight`), diff-scoped to touched requirements
  # files, EXITS NON-ZERO on findings. Promotion clock (ADR-0007 §2.6, 4 clean
  # weeks) starts at merge — 2026-07-02. Kept WARN (`continue-on-error`) until the
  # sweep flips it; do not remove it here.
  prior-decisions:
    needs: setup
    continue-on-error: true # WARN — promotion clock starts at merge 2026-07-02 (ADR-0007 §2.6)
    runs-on: ubuntu-latest
    # `gh pr view` wiring — see the tdd-signal note (Issue #10 root cause 1).
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/prior-decisions-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # ─── Meta-job: single status check for branch protection ─────────────
  # Phase 0 baseline: every hard-red job that actually runs today sits in this
  # needs-list (#440) — a job is either here (BLOCK), `continue-on-error` (WARN),
  # or `if: false` (placeholder until its owning group G6/G8/G9 lands: api-drift,
  # db-drift, generated-artifacts). WARN-only jobs are intentionally excluded.
  # WARN→BLOCK promotion criterion + sweep cadence: ADR-0007 §2.6 (settled in
  # #427; first sweep 2026-07-02 — per-guard verdicts recorded on the Issue).
  # Job name must stay `ci` — branch protection on `main` (per ADR-0008
  # §2.6 item 4) requires exactly one status check context named `ci`.
  # Renaming this job breaks merge gating.
  ci:
    needs:
      [
        setup,
        lint,
        types,
        unit,
        api-e2e,
        build,
        api-build-smoke,
        docs-build,
        markdown-links,
        events-drift,
        glossary-mdx,
        glossary-roundtrip,
        spec-link,
        endpoint-authz,
        tokens-fresh,
        playwright-axe,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      # A required job must SUCCEED — `skipped`/`cancelled` fail too, else a red
      # `setup` skips every downstream job and the aggregate would go green on a
      # run where nothing built or tested (#449 Mode (a) review).
      - name: Aggregate
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "Required job failed, was skipped, or was cancelled"; exit 1
          fi
          echo "All required jobs green"
