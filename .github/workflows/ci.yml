name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  # ─── Core build/test/lint (parallel after setup) ─────────────────────
  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  types:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docs-build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @ds/docs build

  # ─── Drift guards from ADR-0006 §7 ───────────────────────────────────
  api-drift:
    needs: setup
    if: false # Enabled by G8: apps/api (NestJS) + openapi.snapshot.json land then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "api-drift placeholder"

  db-drift:
    needs: setup
    if: false # Enabled by G6: packages/db Drizzle schema lands then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "db-drift placeholder"

  events-drift:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/events-lint.ts

  generated-artifacts:
    needs: setup
    if: false # Enabled by G6: pnpm generate:all + generators (drizzle/openapi-typescript/etc.) land then
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "generated-artifacts placeholder"

  markdown-links:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --include-fragments .
          fail: true

  module-readme:
    needs: setup
    continue-on-error: true # WARN v1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/module-readme-lint.ts

  # ─── Glossary 4-layer validation from ADR-0006 §6 ────────────────────
  glossary-mdx:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/glossary-mdx-lint.ts

  # glossary-ids: covered by ESLint rule `glossary-canonical-ids` inside `lint` job.
  # Re-enable as separate job in G5 when packages/eslint-config rule lands.

  glossary-roundtrip:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/glossary-roundtrip-lint.ts

  # ─── AI-specific guards from ADR-0007 §2.6 ───────────────────────────
  spec-link:
    needs: setup
    runs-on: ubuntu-latest
    # `tools/lint/spec-link-lint.ts` calls `gh pr view <N>` to read PR
    # metadata. The default GITHUB_TOKEN scope under restrictive workflow
    # permissions ("Read repository contents permission only") lacks
    # `pull-requests: read`, which made `gh pr view` exit non-zero and
    # caused the script to fail before its label-skip short-circuit.
    # See Issue #10 root cause 1.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/spec-link-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  ears-tests:
    needs: setup
    continue-on-error: true # WARN v1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/ears-test-lint.ts

  tdd-signal:
    needs: setup
    continue-on-error: true # WARN v1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/tdd-signal-lint.ts

  spec-status-fresh:
    needs: setup
    continue-on-error: true # WARN v1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/spec-status-lint.ts

  prior-decisions:
    needs: setup
    continue-on-error: true # WARN v1
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version-file: .nvmrc, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsx tools/lint/prior-decisions-lint.ts

  # ─── Meta-job: single status check for branch protection ─────────────
  # Phase 0 baseline: only required-needs jobs that actually run today.
  # docs-build, api-drift, db-drift, generated-artifacts join needs-list as their
  # owning groups (G6/G8/G9) land. WARN-only jobs are intentionally excluded.
  # Job name must stay `ci` — branch protection on `main` (per ADR-0008
  # §2.6 item 4 + Amendment A2.2) requires exactly one status check
  # context named `ci`. Renaming this job breaks merge gating.
  ci:
    needs: [lint, types, unit, build, docs-build, markdown-links, spec-link]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "Required job failed"; exit 1
          fi
          echo "All required jobs green"
