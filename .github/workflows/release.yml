name: release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE (#996/§10.5, Issue #999 — "Option A"): the repo-level release-tag cut has
  # been RETIRED from this workflow. The former `tag-release` job cut a release on
  # the `Version Packages` merge — which never fired for a changeset-less
  # product/app-only wave, and (once the deploy also cut a release) would produce a
  # SECOND, ahead-of-prod release. The agent-run `pnpm deploy:prod` is now the sole
  # release initiator: it cuts `release-YYYY.MM.DD-n` at the DEPLOYED SHA via
  # `tools/release/cut-release.mjs` → `cutDeployRelease` (release == what shipped).
  # The changesets `release` job above STAYS — it maintains per-package `version` +
  # `CHANGELOG.md` (the §D1 changelog SSOT); only the repo-level release cut moved
  # to deploy time.
