<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ wrapStyle }}">
  <span style="{{ stickerStyle }}"><span style="width:8px;height:8px;border-radius:50%;background:#fff;animation:livePulse 1.6s ease-in-out infinite"></span>В эфире</span>
  <!-- Колонка времени -->
  <div style="{{ timeColStyle }}">
    <span style="{{ liveInlineStyle }}"><span style="width:7px;height:7px;border-radius:50%;background:#fff;animation:livePulse 1.6s ease-in-out infinite"></span>В эфире</span>
    <div style="{{ timeInnerStyle }}">
      <div style="font-size:{{ timeSize }};font-weight:800;line-height:1;letter-spacing:-.04em;color:{{ timeColor }};font-variant-numeric:tabular-nums;flex:none">{{ time }}</div>
      <div style="{{ timeMetaStyle }}">
        <div style="font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:{{ timeLabelColor }}">{{ num }}</div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:{{ timeSubColor }};line-height:1.45;margin-top:5px">{{ timeSub }}</div>
      </div>
    </div>
  </div>
  <!-- Контент -->
  <div style="padding:{{ bodyPad }};min-width:0">
    <div style="font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:{{ accent }};margin-bottom:12px">{{ school }}</div>
    <a href="{{ href }}" style="display:block;font-size:{{ titleSize }};font-weight:700;line-height:1.3;letter-spacing:-.02em;color:{{ ink }};margin-bottom:18px;text-decoration:none" style-hover="color:{{ accent }}">{{ title }}</a>
    <sc-if value="{{ hasChips }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px">
        <sc-for list="{{ chips }}" as="chip" hint-placeholder-count="3"><span style="font-size:12.5px;font-weight:700;color:{{ chipFg }};background:{{ chipBg }};padding:6px 13px">{{ chip }}</span></sc-for>
      </div>
    </sc-if>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap">
      <div style="font-size:13.5px;line-height:1.65;color:{{ inkMuted }};min-width:180px">{{ speakersEl }}</div>
      <div style="{{ ctaRowStyle }}">{{ ctaEl }}</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:640,&quot;height&quot;:220},&quot;dark&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;live&quot;,&quot;scheduled&quot;,&quot;registered&quot;,&quot;past&quot;],&quot;default&quot;:&quot;scheduled&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;num&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Эфир № 042&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;time&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;19:00&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;timeSub&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;16 июля · ср&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;school&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Школа травматологии и ортопедии&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Пластика ахиллова сухожилия: разбор клинических случаев&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;cta&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Участвовать ↗&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { isMobile: false };
  componentDidMount() {
    this.mq = window.matchMedia('(max-width: 900px)');
    this.upd = () => this.setState({ isMobile: this.mq.matches });
    this.upd();
    this.mq.addEventListener ? this.mq.addEventListener('change', this.upd) : this.mq.addListener(this.upd);
  }
  componentWillUnmount() {
    if (this.mq) this.mq.removeEventListener ? this.mq.removeEventListener('change', this.upd) : this.mq.removeListener(this.upd);
  }
  renderVals() {
    const p = this.props;
    const d = !!p.dark;
    const m = this.state.isMobile;
    const variant = p.variant || 'scheduled';
    const live = variant === 'live';
    const past = variant === 'past';
    const registered = variant === 'registered';

    // Тема
    const ink = d ? '#fff' : 'oklch(.21 .02 250)';
    const inkMuted = d ? 'rgba(255,255,255,.62)' : 'oklch(.45 .014 250)';
    const accent = d ? '#6BB1F7' : '#2D84F2';
    const surface = d ? 'oklch(.21 .02 250)' : '#fff';
    const border = d ? '#fff' : 'oklch(.21 .02 250)';
    const shadow = d ? '#6BB1F7' : '#114D9E';
    const tint = d ? '#0D3A77' : '#D3E8FD';
    const tintInk = d ? '#fff' : '#114D9E';
    const btnBg = d ? '#6BB1F7' : '#114D9E';
    const btnFg = d ? '#0D3A77' : '#fff';
    const R = React.createElement;

    // Спикеры (жирные имена через переданный массив)
    const speakers = Array.isArray(p.speakers) ? p.speakers : (p.speakers ? [p.speakers] : []);
    const speakersEl = speakers.map((s, i) =>
      R('span', { key: i }, R('b', { style: { color: ink } }, s.name), s.org ? ' — ' + s.org : '', i < speakers.length - 1 ? R('br') : null)
    );

    // CTA
    const solid = (label, href) => R('a', { href: href || p.href || '#',
      style: { fontSize: '14.5px', fontWeight: 800, color: btnFg, background: btnBg, border: '2px solid ' + btnBg,
        padding: '14px 24px', whiteSpace: 'nowrap', boxShadow: m ? 'none' : '4px 4px 0 ' + border, textDecoration: 'none', display: 'inline-block' } }, label);
    const ghost = (label) => R('button', {
      style: { font: 'inherit', fontSize: '14.5px', fontWeight: 700, color: ink, background: surface, border: '2px solid ' + border,
        padding: '14px 20px', cursor: 'pointer', whiteSpace: 'nowrap', boxShadow: m ? 'none' : '4px 4px 0 ' + (d ? '#1F69C8' : '#AED4FB') } }, label);

    let ctaEl, ctaRowStyle = { display: 'flex', gap: '12px', flexWrap: 'wrap' };
    if (live) ctaEl = solid(p.cta || 'Войти в эфир ↗', p.ctaHref);
    else if (past) ctaEl = solid('Смотреть запись ↗', p.ctaHref);
    else if (registered) ctaEl = R('div', { style: { display: 'flex', alignItems: 'center', gap: '16px' } },
      R('span', { style: { fontSize: '13px', fontWeight: 800, color: d ? '#4ADE80' : '#009959', whiteSpace: 'nowrap' } }, '✓ В календаре'),
      R('button', { style: { font: 'inherit', fontSize: '13.5px', fontWeight: 700, color: inkMuted, background: 'transparent', border: 0, padding: 0, cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: '4px' } }, 'Отменить'));
    else ctaEl = [solid(p.cta || 'Участвовать ↗', p.ctaHref), p.showSecondary === false ? null : ghost('В календарь')].filter(Boolean).map((e,i)=>R('span',{key:i,style:{display:'inline-flex'}},e));

    // Обёртка карточки: мобильно — плоская, во всю ширину, разделитель снизу
    const timeSize = m ? '40px' : '56px';
    const pastBorder = d ? 'rgba(255,255,255,.28)' : 'oklch(.85 .01 250)';
    const wrapStyle = m
      ? [
          'background:' + surface,
          'border:0',
          'box-shadow:none',
          'display:block',
          'position:relative',
          past ? 'opacity:.82' : ''
        ].filter(Boolean).join(';')
      : [
          'background:' + surface,
          'border:2px solid ' + (past ? pastBorder : border),
          'box-shadow:' + ('6px 6px 0 ' + shadow),
          'display:grid',
          'grid-template-columns:196px 1fr',
          'position:relative',
          past ? 'opacity:.82' : ''
        ].filter(Boolean).join(';');

    const timeColStyle = [
      m ? '' : 'border-right:2px solid ' + border,
      'padding:' + (m ? '14px 16px' : '30px 24px'),
      'background:' + tint,
      'display:flex',
      m ? 'flex-direction:column;align-items:stretch;gap:10px' : 'flex-direction:column;gap:12px;align-items:flex-start'
    ].join(';');
    const timeInnerStyle = m
      ? 'display:flex;flex-direction:column;align-items:flex-start;gap:5px;width:100%'
      : 'display:contents';
    const timeMetaStyle = m ? 'text-align:left' : 'text-align:left';
    const liveInlineStyle = (live && m)
      ? 'align-self:flex-start;display:inline-flex;align-items:center;gap:7px;font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:#C81E1E;padding:5px 11px'
      : 'display:none';

    return {
      wrapStyle, timeColStyle, timeInnerStyle, timeMetaStyle, liveInlineStyle,
      stickerStyle: (live && !m)
        ? 'position:absolute;top:-16px;right:22px;display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:#C81E1E;padding:8px 15px;transform:rotate(3deg);box-shadow:3px 3px 0 ' + shadow + ';z-index:1'
        : 'display:none',
      num: p.num || '',
      time: p.time || '',
      timeSub: p.timeSub || '',
      timeSize,
      timeColor: tintInk,
      timeLabelColor: tintInk,
      timeSubColor: d ? 'rgba(255,255,255,.75)' : 'oklch(.21 .02 250)',
      bodyPad: m ? '16px 16px 18px' : '30px 32px',
      titleSize: m ? '20px' : '24px',
      school: p.school || '',
      title: p.title || '',
      href: p.href || '#',
      hasChips: Array.isArray(p.chips) && p.chips.length > 0,
      chips: p.chips || [],
      chipFg: d ? '#fff' : 'oklch(.21 .02 250)',
      chipBg: tint,
      accent, ink, inkMuted,
      speakersEl, ctaEl, ctaRowStyle
    };
  }
}
</script>
</body>
</html>
