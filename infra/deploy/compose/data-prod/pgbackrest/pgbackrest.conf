# DS Platform data-prod — pgbackrest repo + stanza config (DSO-100 spec §6.3).
# Mounted read-only into BOTH the postgres container (for archive_command) and the
# pgbackrest sidecar (for scheduled backups). Only NON-secret, NON-deploy-specific
# policy lives here; every secret and every per-deploy value is injected via the
# PGBACKREST_* env from data.env (data.env.example), so this file is committable:
#   PGBACKREST_REPO1_S3_BUCKET      pgbackrest_bucket_full_name (terraform output)
#   PGBACKREST_REPO1_S3_ENDPOINT    pgbackrest_s3_hostname (terraform output)
#   PGBACKREST_REPO1_S3_REGION      Timeweb S3 region
#   PGBACKREST_REPO1_S3_KEY         S3 access key   (terraform output, DD-6)
#   PGBACKREST_REPO1_S3_KEY_SECRET  S3 secret key   (terraform output, DD-6)
#   PGBACKREST_REPO1_CIPHER_PASS    repo AES-256-CBC passphrase (secret)

[global]
repo1-type=s3
repo1-path=/pgbackrest
repo1-s3-uri-style=path
# Retention: 7 daily fulls (spec §6.3). No retention on the partition drop-mask side
# — that is a Postgres/pg_partman concern, not a backup concern.
repo1-retention-full=7
# Encrypt the repo (backups + archived WAL) at rest with AES-256-CBC; passphrase via
# PGBACKREST_REPO1_CIPHER_PASS (never in this file).
repo1-cipher-type=aes-256-cbc
# WAL archiving is SYNCHRONOUS (archive-async=n) — simplest correct model for the
# pre-pilot's near-zero write volume, and it avoids a shared archive spool between
# the two containers. Revisit (async + spool) only if archive latency shows up.
archive-async=n
start-fast=y
log-level-console=info
log-level-file=info
log-path=/var/log/pgbackrest
process-max=2

[ds]
# The one stanza — the ds_prod cluster on this box. pgbackrest reads PGDATA files
# directly (shared volume) and connects to Postgres over the shared unix socket
# (local `trust` in the official image's pg_hba) as the superuser `ds`.
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-socket-path=/var/run/postgresql
pg1-user=ds
pg1-database=ds_prod
