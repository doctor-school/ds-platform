# DS Platform data-prod — Postgres 17 PROD tuning + WAL archiving (DSO-100 §6.3).
#
# Loaded via: postgres -c config_file=/etc/postgresql/postgresql.conf
# Values target the 4 vCPU / 8 GB data-prod preset (spec §4). This is the PROD
# counterpart to infra/dev-stand/postgres/postgresql.conf.dev (whose header notes
# "Production tuning is owned by the prod-deploy infra, a separate concern").

# --- Extensions / background workers ---
# pg_partman background worker (ADR-0003 §3) — partition auto-creation runs INSIDE
# Postgres via the BGW. dbname = the app database (ds_prod); role = the owner of the
# `partman` schema (ds). Loading the library requires a restart. Binary ships in the
# data-layer image (postgres/Dockerfile).
shared_preload_libraries = 'pg_partman_bgw'
pg_partman_bgw.dbname = 'ds_prod'
pg_partman_bgw.role = 'ds'
pg_partman_bgw.interval = 3600

# --- Connections ---
# Listen on all container interfaces; the compose port publish binds the host side
# to the VPC IP only (compose.yml), so Postgres is never exposed on the public IP.
listen_addresses = '*'
max_connections = 100
# Pin the socket dir so the pgbackrest sidecar's pg1-socket-path matches
# deterministically (it connects over the shared `pgsocket` volume).
unix_socket_directories = '/var/run/postgresql'

# hba_file / ident_file must point back into PGDATA: with config_file OUTSIDE PGDATA
# they would otherwise default next to this file and not be found (the official
# entrypoint generates them inside PGDATA). Dev-stand precedent.
hba_file = '/var/lib/postgresql/data/pg_hba.conf'
ident_file = '/var/lib/postgresql/data/pg_ident.conf'

# --- Memory (8 GB box) ---
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 16MB
maintenance_work_mem = 512MB

# --- Write-ahead log + archiving (pgbackrest, spec §6.3) ---
# archive_mode=on + a pgbackrest archive-push archive_command give continuous WAL
# archive → RPO ≤ 15 min. wal_level=replica is sufficient for physical backup/PITR.
# pgbackrest reads its S3 creds + cipher pass from the PGBACKREST_* env (data.env,
# inherited by the postgres process) and its stanza from /etc/pgbackrest/pgbackrest.conf.
wal_level = replica
archive_mode = on
archive_command = 'pgbackrest --stanza=ds archive-push %p'
max_wal_size = 4GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9

# --- Planner (SSD/NVMe) ---
random_page_cost = 1.1
effective_io_concurrency = 200

# --- Logging ---
log_min_duration_statement = 500ms
log_line_prefix = '%m [%p] %q%u@%d '
log_checkpoints = on

# --- Timezone (server storage in UTC; the pgbackrest cron runs on MSK, compose TZ) ---
timezone = 'UTC'
