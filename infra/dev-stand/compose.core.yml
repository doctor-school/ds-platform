# DS Platform — local dev-stand core compose (PORTABLE CONTRACT)
#
# Single source of truth for service composition: which services exist, their
# images/versions, env-var names, named volumes and healthchecks. Identical for
# every developer. Storage topology is NOT prescribed here — a personal
# compose.override.yml may swap the named volumes for bind mounts (see
# compose.override.example.yml and setup-design §7.2).
#
# Fixed project name keeps every container namespaced as ds-platform-dev-<svc>-1
# and the bridge as ds-platform-dev_default, so the stand never collides with
# co-hosted workloads (see README -> Container isolation).
#
# Host-side ports are env-driven (${<SVC>_PORT:-default}); a recipe whose host
# already binds a default port remaps it in .env.local without editing this
# file (see README -> Container isolation port table; .env.example -> Host port
# overrides).
#
# The idp service (Zitadel, closed per ADR-0001 §8 / DSP-209) runs OIDC/JWT
# auth. Its state is DB-backed — config, users, orgs, signing keys and uploaded
# assets all live in the shared Postgres — so it carries no named volume of its
# own; reboot-persistence rides on the postgres dataset. The OIDC application
# (client_id/secret, redirect URIs) is bootstrapped manually per recipe, a
# follow-up to this infra wiring (see idp/bootstrap.md). Observability services
# (loki/grafana/glitchtip/promtail) live in a separate compose.observability.yml
# started on demand only (setup-design §3.2).
name: ds-platform-dev

services:
  # --- Postgres 17 + pgvector — primary datastore (ADR-0003) ---
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ds
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ds_dev
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ds-postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf.dev:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ds -d ds_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Redis 7 — cache, sessions, BullMQ broker, Centrifugo PubSub ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ds-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO — S3-compatible object storage ---
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ds-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Centrifugo v6 — realtime WebSocket server ---
  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    command: centrifugo --config=/centrifugo/config.json --health.enabled
    ports:
      - "${CENTRIFUGO_PORT:-8000}:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
      - ds-centrifugo:/centrifugo/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Cerbos — policy decision point (PDP) ---
  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    restart: unless-stopped
    command: ["server", "--config=/config/config.yaml"]
    ports:
      - "${CERBOS_HTTP_PORT:-3592}:3592"
      - "${CERBOS_GRPC_PORT:-3593}:3593"
    volumes:
      - ./cerbos/config.yaml:/config/config.yaml:ro
      - ./cerbos/policies:/policies:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--config=/config/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Mailpit — dev SMTP catch-all + web UI ---
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- sms-sink — dev SMS catch-all (the SMS analogue of Mailpit) ---
  # Zitadel's generic HTTP SMS provider (configured by idp/provision.sh) POSTs
  # every outbound SMS here instead of a real gateway — exactly as the SMTP
  # provider points at Mailpit rather than a real SMTP. SMS-Aero is the PRODUCTION
  # sender (recorded in the specs); the dev-stand never reaches it. The catcher
  # stores each webhook body and exposes a small REST API so the live SMS-OTP e2e
  # (EARS-7) reads the delivered code back by recipient phone, mirroring the
  # email-OTP test reading codes from Mailpit. Production code path is untouched
  # (no returnCode leak, no test backdoor — AGENTS.md §6). Dependency-free: the
  # stock node image runs a bind-mounted script, so there is no bespoke image to
  # build (same "plain upstream image" shape as mailpit). Zitadel reaches it on
  # the bridge as `sms-sink:8090`; the test reaches it on the published host port.
  sms-sink:
    image: node:22-alpine
    restart: unless-stopped
    command: ["node", "/srv/server.mjs"]
    environment:
      SMS_SINK_PORT: "8090"
    ports:
      - "${SMS_SINK_PORT:-8090}:8090"
    volumes:
      - ./sms-sink/server.mjs:/srv/server.mjs:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8090/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- sms-aero-adapter — REAL outbound SMS route (opt-in, COSTS MONEY) ---
  # The production counterpart to sms-sink. sms-sink is the free dev catch-all
  # Zitadel POSTs to by DEFAULT; this adapter is the opt-in route that forwards
  # each outbound SMS to SMS-Aero (smsaero.ru Gate API v2, the production sender
  # recorded in the specs). idp/provision.sh decides which one Zitadel's HTTP SMS
  # provider points at from SMS_DELIVERY_MODE (sink|real, default sink) — exactly
  # the BOT_PROTECTION_ENABLED env-flag precedent. Harmless when unused: Zitadel
  # only ever POSTs here when the operator selects `real` and re-runs the
  # provisioner. Real SMS COSTS MONEY, so the flag is OFF by default and the real
  # route is exercised by one supervised paid test only (#176; idp/bootstrap.md
  # §3.bis). The SMS-Aero creds (SMSAERO_EMAIL / SMSAERO_API_KEY / SMSAERO_SIGN)
  # arrive via the .env.local -> remote `.env` sync and are read ONLY from env —
  # never committed (production keys live in Beget ~/.env). Dependency-free: the
  # stock node image runs a bind-mounted script, so there is no bespoke image to
  # build (same "plain upstream image" shape as sms-sink). Zitadel reaches it on
  # the bridge as `sms-aero-adapter:8091`.
  sms-aero-adapter:
    image: node:22-alpine
    restart: unless-stopped
    command: ["node", "/srv/server.mjs"]
    environment:
      SMS_AERO_ADAPTER_PORT: "8091"
      # Read from the compose `.env` (synced from .env.local); unset on a stand
      # that never selects `real`, which is fine — the adapter just isn't used.
      SMSAERO_EMAIL: ${SMSAERO_EMAIL:-}
      SMSAERO_API_KEY: ${SMSAERO_API_KEY:-}
      SMSAERO_SIGN: ${SMSAERO_SIGN:-SMS Aero}
    ports:
      - "${SMS_AERO_ADAPTER_PORT:-8091}:8091"
    volumes:
      - ./sms-aero-adapter/server.mjs:/srv/server.mjs:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8091/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Zitadel — OIDC identity provider / JWT issuer (ADR-0001 §8, DSP-209) ---
  # Single Go binary, DB-backed (no named volume — see header). ExternalDomain
  # and ExternalPort are env-driven so this contract stays recipe-agnostic: they
  # MUST match the host:port clients actually reach, or OIDC discovery advertises
  # a wrong issuer. TLS is disabled via ZITADEL_TLS_ENABLED (env, not the
  # start-only --tlsMode flag) so every subcommand shares it — notably the
  # distroless-image healthcheck `/app/zitadel ready`, which probes the local
  # /debug/ready over the same scheme (no shell or curl in the image). Zitadel
  # connects to the shared postgres as admin `ds` and creates its own `zitadel`
  # database on first boot. The masterkey (IDP_SECRET_KEY) must be exactly 32
  # characters.
  idp:
    image: ghcr.io/zitadel/zitadel:latest
    restart: unless-stopped
    # --masterkeyFromEnv reads the secret from ZITADEL_MASTERKEY (below) rather
    # than taking it as a CLI value, so the masterkey never lands in
    # `docker inspect` / the process list — matching how the other secrets here
    # are passed. The flag is required; the env var alone is not read.
    command:
      - start-from-init
      - --masterkeyFromEnv
    environment:
      ZITADEL_MASTERKEY: ${IDP_SECRET_KEY}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALDOMAIN: ${IDP_EXTERNAL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${IDP_PORT:-9080}
      # Login V2 — REQUIRED for the headless BFF session->token exchange (EARS-8).
      # The api's Variant-B flow (apps/api auth design §3) does NOT render any login
      # UI; it links a server-checked session to a pending OIDC auth request via
      # POST /v2/oidc/auth_requests/{id}. That session-link API only resolves an
      # auth request CREATED UNDER LOGIN V2 — with the feature off, the authorize
      # hop files a v1 auth request the v2 API can't see and the link 404s
      # ("Auth Request does not exist", proven live #146). Enabling the feature is
      # enough: the v2 login UI ships as a SEPARATE Next.js `login` container, but
      # the BFF never hits it (no baseUri set), and the auth_requests + token
      # endpoints are served by THIS core binary. The org-owner machine user also
      # needs the IAM_LOGIN_CLIENT role to call the link API — granted by
      # idp/provision.sh, not here. Read at init, stored on the instance. Default
      # true; do NOT disable it (that was the reverted #144 workaround).
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: ${IDP_LOGIN_V2_REQUIRED:-true}
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ds
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ds
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # First-instance bootstrap (recipe-opt-in, read ONLY on a fresh init — a
      # re-init drops the `zitadel` DB so start-from-init re-runs the init step).
      # When IDP_BOOTSTRAP=1 the setup creates an IAM-owner machine user
      # (`ds-bootstrap`, the credential idp/provision.sh authenticates with) plus a
      # deterministic console admin (`zitadel-admin`), and writes the machine user's
      # PAT to PatPath. The PAT file IS written and is readable (the earlier #144
      # "file never written" claim was wrong: the blocker was a root-owned mount,
      # not the init step — with a tmpfs owned by the Zitadel uid the file lands as
      # /pat/pat.txt owned 1000:1000, no console mint needed; see idp/bootstrap.md
      # §2). Empty (the default) -> standard init, every var below is inert.
      ZITADEL_FIRSTINSTANCE_PATPATH: ${IDP_BOOTSTRAP:+/pat/pat.txt}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: ${IDP_BOOTSTRAP:+ds-bootstrap}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: ${IDP_BOOTSTRAP:+ds-bootstrap}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${IDP_BOOTSTRAP:+2099-12-31T23:59:59Z}
      # Deterministic console admin (only created when IDP_BOOTSTRAP is set, since
      # USERNAME gates it). Password is dev-only on a trusted LAN; never reuse it
      # off the dev-stand.
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${IDP_BOOTSTRAP:+zitadel-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${IDP_BOOTSTRAP:+${IDP_BOOTSTRAP_ADMIN_PASSWORD:-}}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: ${IDP_BOOTSTRAP:+false}
    # Writable tmpfs for the FIRSTINSTANCE PatPath file. The distroless image has
    # no writable /tmp and runs as the non-root `zitadel` user (uid/gid 1000); a
    # named volume or a default tmpfs is root-owned, so the process can't create
    # the PAT file there. Owning the tmpfs by uid/gid 1000 lets the init step write
    # /pat/pat.txt directly (root-cause fix for the #144 manual-mint workaround).
    # Inert unless IDP_BOOTSTRAP is set.
    tmpfs:
      - /pat:uid=1000,gid=1000,mode=0700
    ports:
      - "${IDP_PORT:-9080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      # start-from-init runs DB migrations inline on a fresh database, so the
      # first boot needs a longer grace than the upstream init-container split.
      start_period: 60s

# Named volumes — Docker-managed, isolated per machine. A personal
# compose.override.yml may swap these for bind mounts (setup-design §7.2).
volumes:
  ds-postgres:
  ds-redis:
  ds-minio:
  ds-centrifugo:
