# DS Platform — local dev-stand core compose (PORTABLE CONTRACT)
#
# Single source of truth for service composition: which services exist, their
# images/versions, env-var names, named volumes and healthchecks. Identical for
# every developer. Storage topology is NOT prescribed here — a personal
# compose.override.yml may swap the named volumes for bind mounts (see
# compose.override.example.yml and setup-design §7.2).
#
# Fixed project name keeps every container namespaced as ds-platform-dev-<svc>-1
# and the bridge as ds-platform-dev_default, so the stand never collides with
# co-hosted workloads (see README -> Container isolation).
#
# Host-side ports are env-driven (${<SVC>_PORT:-default}); a recipe whose host
# already binds a default port remaps it in .env.local without editing this
# file (see README -> Container isolation port table; .env.example -> Host port
# overrides).
#
# The idp service (Zitadel, closed per ADR-0001 §8 / DSP-209) runs OIDC/JWT
# auth. Its state is DB-backed — config, users, orgs, signing keys and uploaded
# assets all live in the shared Postgres — so it carries no named volume of its
# own; reboot-persistence rides on the postgres dataset. The OIDC application
# (client_id/secret, redirect URIs) is bootstrapped manually per recipe, a
# follow-up to this infra wiring (see idp/bootstrap.md). Observability services
# (loki/grafana/glitchtip/promtail) live in a separate compose.observability.yml
# started on demand only (setup-design §3.2).
name: ds-platform-dev

services:
  # --- Postgres 17 + pgvector — primary datastore (ADR-0003) ---
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ds
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ds_dev
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ds-postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf.dev:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ds -d ds_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Redis 7 — cache, sessions, BullMQ broker, Centrifugo PubSub ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ds-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO — S3-compatible object storage ---
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ds-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Centrifugo v6 — realtime WebSocket server ---
  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    command: centrifugo --config=/centrifugo/config.json --health.enabled
    ports:
      - "${CENTRIFUGO_PORT:-8000}:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
      - ds-centrifugo:/centrifugo/data
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Cerbos — policy decision point (PDP) ---
  cerbos:
    image: ghcr.io/cerbos/cerbos:latest
    restart: unless-stopped
    command: ["server", "--config=/config/config.yaml"]
    ports:
      - "${CERBOS_HTTP_PORT:-3592}:3592"
      - "${CERBOS_GRPC_PORT:-3593}:3593"
    volumes:
      - ./cerbos/config.yaml:/config/config.yaml:ro
      - ./cerbos/policies:/policies:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--config=/config/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- Mailpit — dev SMTP catch-all + web UI ---
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Zitadel — OIDC identity provider / JWT issuer (ADR-0001 §8, DSP-209) ---
  # Single Go binary, DB-backed (no named volume — see header). ExternalDomain
  # and ExternalPort are env-driven so this contract stays recipe-agnostic: they
  # MUST match the host:port clients actually reach, or OIDC discovery advertises
  # a wrong issuer. TLS is disabled via ZITADEL_TLS_ENABLED (env, not the
  # start-only --tlsMode flag) so every subcommand shares it — notably the
  # distroless-image healthcheck `/app/zitadel ready`, which probes the local
  # /debug/ready over the same scheme (no shell or curl in the image). Zitadel
  # connects to the shared postgres as admin `ds` and creates its own `zitadel`
  # database on first boot. The masterkey (IDP_SECRET_KEY) must be exactly 32
  # characters.
  idp:
    image: ghcr.io/zitadel/zitadel:latest
    restart: unless-stopped
    # --masterkeyFromEnv reads the secret from ZITADEL_MASTERKEY (below) rather
    # than taking it as a CLI value, so the masterkey never lands in
    # `docker inspect` / the process list — matching how the other secrets here
    # are passed. The flag is required; the env var alone is not read.
    command:
      - start-from-init
      - --masterkeyFromEnv
    environment:
      ZITADEL_MASTERKEY: ${IDP_SECRET_KEY}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_EXTERNALDOMAIN: ${IDP_EXTERNAL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${IDP_PORT:-9080}
      # Zitadel v4 defaults to the v2 login UI, which ships as a SEPARATE Next.js
      # `login` container not deployed in this single-binary dev-stand. Forcing it
      # off makes the core binary serve its built-in (v1) login at /ui/login, so
      # the dev-stand has a working interactive login + Console without a second
      # service. Read at init time and stored on the instance; a recipe that later
      # adds the login container can flip this back. Default true = upstream.
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: ${IDP_LOGIN_V2_REQUIRED:-false}
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ds
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ds
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # First-instance bootstrap (recipe-opt-in, read ONLY on a fresh init — a
      # re-init drops the `zitadel` DB so start-from-init re-runs the init step).
      # When IDP_BOOTSTRAP=1 the setup creates an IAM-owner machine user
      # (`ds-bootstrap`, the credential idp/provision.sh authenticates with) plus a
      # deterministic console admin (`zitadel-admin`) so the bootstrap can mint the
      # machine user's PAT without console guesswork. The PatPath file output is
      # also requested, but on v4.15 start-from-init it does NOT reliably write a
      # readable file (the PAT row lands in the DB, the file does not) — so the
      # documented PAT acquisition is via the console admin (idp/bootstrap.md §2).
      # Empty (the default) -> standard init, every var below is inert.
      ZITADEL_FIRSTINSTANCE_PATPATH: ${IDP_BOOTSTRAP:+/pat/pat.txt}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: ${IDP_BOOTSTRAP:+ds-bootstrap}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: ${IDP_BOOTSTRAP:+ds-bootstrap}
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${IDP_BOOTSTRAP:+2099-12-31T23:59:59Z}
      # Deterministic console admin (only created when IDP_BOOTSTRAP is set, since
      # USERNAME gates it). Password is dev-only on a trusted LAN; never reuse it
      # off the dev-stand.
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${IDP_BOOTSTRAP:+zitadel-admin}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${IDP_BOOTSTRAP:+${IDP_BOOTSTRAP_ADMIN_PASSWORD:-}}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: ${IDP_BOOTSTRAP:+false}
    # Writable tmpfs for the FIRSTINSTANCE PatPath file (distroless has no writable
    # /tmp; a named volume is root-owned and the non-root Zitadel process can't
    # write it). Inert unless IDP_BOOTSTRAP is set.
    tmpfs:
      - /pat:mode=1777
    ports:
      - "${IDP_PORT:-9080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      # start-from-init runs DB migrations inline on a fresh database, so the
      # first boot needs a longer grace than the upstream init-container split.
      start_period: 60s

# Named volumes — Docker-managed, isolated per machine. A personal
# compose.override.yml may swap these for bind mounts (setup-design §7.2).
volumes:
  ds-postgres:
  ds-redis:
  ds-minio:
  ds-centrifugo:
