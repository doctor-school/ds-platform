# DS Platform — personal compose override TEMPLATE (NOT a portable contract).
#
# Copy this file to your personal overlay and edit it for your recipe:
#   cp compose.override.example.yml ~/.ds-platform/compose.override.yml
#
# compose.override.yml is gitignored. Docker Compose merges it on top of
# compose.core.yml when both are passed with -f; override volumes win over the
# named-volume references in the core file (setup-design §7.2).
#
# The core file uses Docker-managed named volumes by default. Override it only
# if your recipe needs a different storage topology (bind mounts, network
# volumes, cloud disks).
#
# --- Example: Tech Lead's "TrueNAS Hybrid" recipe ---------------------------
# Replaces named volumes with bind mounts onto ZFS datasets (setup-design §5.3).
# Uncomment and adjust paths once DSP-154 defines the core services.
#
# services:
#   postgres:
#     volumes:
#       - /mnt/Daily/dev/postgres:/var/lib/postgresql/data
#   redis:
#     volumes:
#       - /mnt/Daily/dev/redis:/data
#   minio:
#     volumes:
#       - /mnt/Daily/dev/minio:/data
#
# --- Example: "Docker Desktop host-only" recipe -----------------------------
# Keep the core file's named volumes — no override needed. This file can stay
# empty (an empty services map) for the simplest single-machine setup.
services: {}
