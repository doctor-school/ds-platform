name: CI
on:
  pull_request:
    branches: [main]
jobs:
  # gh-gated but MISSING the job-level `permissions` block → finding (the
  # Issue-#10 root cause: `gh pr view` exits non-zero under the default scope).
  spec-link:
    runs-on: ubuntu-latest
    steps:
      - run: pnpm exec tsx tools/lint/spec-link-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # Compliant sibling — its presence proves findings are scoped per-job.
  registry-research:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - run: pnpm lint:registry-research
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
