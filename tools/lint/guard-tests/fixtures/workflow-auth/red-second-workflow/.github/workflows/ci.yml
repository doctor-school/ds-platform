name: CI
on:
  pull_request:
    branches: [main]
jobs:
  # Non-gh job — no `permissions`, must be IGNORED by the guard.
  lint:
    runs-on: ubuntu-latest
    steps:
      - run: pnpm lint
      - run: pnpm exec tsx tools/lint/module-readme-lint.ts

  # gh-gated via a DIRECT guard-file path — compliant.
  spec-link:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - run: pnpm exec tsx tools/lint/spec-link-lint.ts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # gh-gated via the `pnpm lint:<name>` ALIAS path — compliant.
  registry-research:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - run: pnpm lint:registry-research
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
